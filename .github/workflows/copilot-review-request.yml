name: Request Copilot PR Review

# Fires when Copilot SWE Agent opens or reopens a PR.
# Posts a @Copilot comment to trigger a self-review.

on:
  pull_request:
    types: [opened, reopened]

jobs:
  request-review:
    name: Post Copilot review request
    runs-on: ubuntu-latest
    if: github.event.pull_request.user.login == 'Copilot'
    permissions:
      pull-requests: write
      issues: write        # required — PR comments use the issues API

    steps:
      - name: Post review request comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          REPO: ${{ github.repository }}
        run: |
          gh pr comment $PR_NUMBER \
            --repo $REPO \
            --body "@Copilot Please review this PR. Verify that the implementation matches all acceptance criteria in the linked issue. Flag any type errors, deviations from existing patterns (hooks, AppSync auth directives, MCP tool registration), or missing edge cases."
