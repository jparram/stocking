name: CI

on:
  pull_request:
    branches: [master]

jobs:
  typecheck-and-build:
    name: Type check & build
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Build
        run: npm run build

  typecheck-mcp:
    name: Type check stocking-mcp
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: stocking-mcp/package-lock.json

      - name: Install dependencies
        working-directory: stocking-mcp
        run: npm ci

      - name: Type check
        working-directory: stocking-mcp
        run: npx tsc --noEmit

      - name: Build
        working-directory: stocking-mcp
        run: npm run build
